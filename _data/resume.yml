            周期性的系统升级，修复已知bug，提升系统稳定性和性能；
  
  - title: 互联网金融服务V2.0--支付中心二期项目
    duration: 
    detail: 重新启动的项目，涉及虚拟机密码重置、账号新建，台账更新维护、各服务运行状态、可用性、安全性；
            月度发版、排查故障、修复漏洞、验证服务等；
            编写版本发布和回退方案，并在南方ios平台申请作业，版本发布完成后，验证服务启动和业务正常。
   
  - title: 运营资本域项目
    duration: 
    detail: 服务器申请，资源验证，防火墙策略变更；
            dokerfile编写，tsf平台实例创建，打包和发布；
            搭建和配置nginx，验证前端页面跳转和显示正常；
            容器镜像备份，镜像脚本维护；

  - title: 美的金融科技
    duration: 
    detail: 测试环境资源规划，编写DMZ和IDC区域流程图；
            中间件搭建并压力测试，keepalived + lvs + nginx 高可用、redis cluster、rocketmq、zookeeper、elasticsearch ；
            编写运维手册，部署手册；
            编写python、shell自动化脚本；
    list:
    - 优化应用日志转存脚本，自动处理变动的应用名，且自动识别未转存的历史遗留日志，防止丢失，
    - 编写python脚本，自动收集指定目录里的信息，如logs文件，方便确认应用是否在输出日志
    - python脚本自动化收集各系统节点的各环境版本，系统，中间件，jdk等，并输出为表格，按需升级
    - shell脚本和prometheus互补，检测系统隐患，基础环境运行良好
    - 提供容器镜像自动化清除脚本，保留最近三副本，既节省容量，又减少网络波动，仓库拉取镜像导致的失败
    - 将安排的任务或者已有的任务自动化和优化，较少人为失误；也较少应用发版时间和开发同事的等待时间
    - 协助开发进行容器、私有云等排错，减少跨部门之间沟通的时间成本

              
